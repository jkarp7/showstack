appId: com.lytrix.showstack
productName: ShowStack
copyright: Copyright © 2025 Lytrix

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json
  - "!**/*.ts"
  - "!**/*.map"
  - "!.git"
  - "!.github"
  - "!.vscode"
  - "!src"
  - "!proof-of-concept"
  - "!docs"
  - "!*.md"
  - "!.gitignore"
  - "!.eslintrc*"
  - "!.prettierrc*"
  - "!tsconfig.json"
  - "!electron.vite.config.ts"

# Publish to GitHub Releases for auto-updates
publish:
  provider: github
  owner: jkarp7
  repo: showstack

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  # icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  darkModeSupport: true

dmg:
  title: "ShowStack ${version}"
  # icon: resources/icon.icns
  # background: resources/dmg-background.png
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 400

win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "ShowStack"

linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: resources/icon.png
  synopsis: "Modern production management software for live entertainment"
  description: |
    ShowStack is a comprehensive lighting design and production management
    tool for theater, concerts, and live events. Features include fixture
    management, power distribution, label printing, and integration with
    ETC Eos consoles and Vectorworks.

appImage:
  license: LICENSE

