# Simple PowerSync Sync Rules for ShowStack

bucket_definitions:
  user_data:
    parameters: SELECT token_parameters.user_id as user_id
    data:
      - SELECT * FROM projects WHERE user_id = bucket.user_id
      - SELECT * FROM fixtures WHERE project_id IN (SELECT id FROM projects WHERE user_id = bucket.user_id)
      - SELECT * FROM shop_order_projects WHERE user_id = bucket.user_id
